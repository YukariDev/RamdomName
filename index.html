<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Công cụ Random Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Random Picker</h1>
        <textarea id="nameList" rows="5" placeholder="Nhập danh sách tên (cách nhau bởi dấu phẩy)..."></textarea>
        <button onclick="pickRandom()">BẮT ĐẦU CHỌN</button>
        <div id="result"></div>
    </div>

    <script>
        function pickRandom() {
            let input = document.getElementById('nameList').value;
            let names = input.split(',').map(name => name.trim()).filter(n => n !== "");
            
            if(names.length === 0) {
                document.getElementById('result').innerText = "Hãy nhập tên trước!";
                return;
            }
            
            let randomName = names[Math.floor(Math.random() * names.length)];
            document.getElementById('result').innerText = "🎯 " + randomName;
        }
    </script>
</body>
</html>
